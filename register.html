<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 中医文化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#8B4513',secondary:'#D2B48C'},borderRadius:{'none':'0px','sm':'4px',DEFAULT:'8px','md':'12px','lg':'16px','xl':'20px','2xl':'24px','3xl':'32px','full':'9999px','button':'8px'}}}}</script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link href="./css/register.css" rel="stylesheet">
    <link href="./css/no-rounded.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-bl from-stone-50 to-stone-100 min-h-screen">
   
    <nav class="fixed top-0 left-0 right-0 z-50 w-full px-8 py-6 bg-white/95 backdrop-blur-sm shadow-md">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center">
            </a>
            <div class="hidden md:flex items-center space-x-8">
                <a href='index.html' class="text-primary hover:text-primary/80 font-medium transition-colors">中医文化</a>
                <a href="herbs.html" class="text-primary hover:text-primary/80 font-medium transition-colors">中医草药</a>
                <a href="heritage.html" class="text-primary hover:text-primary/80 font-medium transition-colors">中医传承</a>
                <a href="meridians.html" class="text-primary hover:text-primary/80 font-medium transition-colors">中医经络</a>
                <a href="wellness.html" class="text-primary hover:text-primary/80 font-medium transition-colors">中医养生</a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="login.html" class="text-primary hover:text-primary/80 font-medium transition-colors">登录</a>
                <a href="register.html" class="bg-primary text-white px-6 py-2 !rounded-button hover:bg-primary/90 transition-colors whitespace-nowrap">
                    注册
                </a>
            </div>
        </div>
    </nav>


    
    <main class="flex items-center justify-center p-8 pt-32 ">
        <div class="max-w-2xl w-full mx-auto">
            
            <div class="bg-white rounded-xl shadow-2xl p-8 traditional-border mx-auto">
                <div class="text-center mb-8">
                    <a href="index.html" class="inline-block">

                    </a>
                    <p class="text-gray-600 mt-4">传承中医文化，弘扬国粹精神</p>
                </div>

                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">手机号</label>
                        <input type="tel" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入手机号">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                        <input type="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入邮箱地址">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请设置密码">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
                        <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请再次输入密码">
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" class="hidden" id="agree-terms">
                        <div class="w-5 h-5 border-2 border-gray-300 rounded flex items-center justify-center cursor-pointer mr-2" onclick="this.querySelector('i').classList.toggle('hidden')">
                            <i class="ri-check-line text-primary text-sm hidden"></i>
                        </div>
                        <span class="text-sm text-gray-600">我已阅读并同意 <a href="#" class="text-primary hover:text-primary/80">服务条款</a> 和 <a href="#" class="text-primary hover:text-primary/80">隐私政策</a></span>
                    </div>
                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg hover:bg-primary/90 transition-colors font-medium">
                        注册
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">已有账号？ 
                        <a href="login.html" class="text-primary hover:text-primary/80 font-medium">立即登录</a>
                    </p>
                </div>
            </div>

            
            </div>
        </div>
    </main>
    <script src="./js/navigation.js"></script>
</body>
</html>
